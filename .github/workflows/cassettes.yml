name: GO build

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
        
    name: Run build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: go mod tidy
     #   run: go mod download
      
      - name: Build
        run: go build -v ./...
     
    #  - name: docker
    #    run: docker pull testcontainers/ryuk:0.12.0

      - run: go test -v ./...
        continue-on-error: true
